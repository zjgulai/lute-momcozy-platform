server {
    listen 80;
    server_name shopify.lute-tlz-dddd.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name shopify.lute-tlz-dddd.top;

    ssl_certificate     /etc/ssl/certs/momcozy-audit.crt;
    ssl_certificate_key /etc/ssl/private/momcozy-audit.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root  /opt/momcozy-audit/html;
    index index.html;

    server_tokens off;
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location ~* \.(css|js|svg|woff2?|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    error_page 404 /404/index.html;
}
