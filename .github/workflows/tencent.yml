name: Build and Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [audit-data-updated]

permissions:
  contents: read

concurrency:
  group: tencent-platform
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout data source (lute-momcozy-audit)
        uses: actions/checkout@v4
        with:
          repository: zjgulai/lute-momcozy-audit
          path: lute-momcozy-audit
      - name: Copy data into platform src/data
        run: |
          mkdir -p src/data
          cp -r lute-momcozy-audit/src/_data/. src/data/
          echo "Data files copied:"
          ls src/data/
      - name: Validate copied data
        run: |
          test -f src/data/public-cross-audit.json || { echo "FATAL: public-cross-audit.json missing"; exit 1; }
          test -d src/data/sessions || { echo "FATAL: sessions/ directory missing"; exit 1; }
          test -d src/data/competitors || { echo "FATAL: competitors/ directory missing"; exit 1; }
          node -e "
            const d = JSON.parse(require('fs').readFileSync('src/data/public-cross-audit.json','utf8'));
            if (!d.diagnosticNarrative) throw new Error('Missing diagnosticNarrative');
            if (!d.metricDictionary) throw new Error('Missing metricDictionary');
            if (!d.diagnosticGaps360) throw new Error('Missing diagnosticGaps360');
            const sessions = require('fs').readdirSync('src/data/sessions').filter(f=>f.endsWith('.json'));
            if (!sessions.length) throw new Error('No session files found');
            console.log('Data validation passed:', Object.keys(d).length, 'top-level keys,', sessions.length, 'sessions');
          "
      - name: Run data integrity tests
        run: npm test
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
      - name: Pack output for upload
        run: tar -czf platform-out.tar.gz -C out .
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-out-${{ github.sha }}
          path: platform-out.tar.gz
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-out-${{ github.sha }}
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          timeout 60 ssh-keyscan -T 30 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload nginx config
        run: |
          scp -i ~/.ssh/deploy_key -o ConnectTimeout=60 \
            ops/nginx/momcozy-platform.conf \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ai-video/deploy/lighthouse/momcozy-platform.conf"
      - name: Upload and deploy
        run: |
          DEPLOY_ROOT_CLEAN="${DEPLOY_ROOT//[[:space:]]/}"
          scp -i ~/.ssh/deploy_key -o ConnectTimeout=60 -o ServerAliveInterval=10 \
            platform-out.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/platform-out.tar.gz"
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=60 \
            -o ServerAliveInterval=10 -o ServerAliveCountMax=6 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash -s -- '${DEPLOY_ROOT_CLEAN}'" <<'REMOTE'
          set -Eeuo pipefail
          ROOT=$1
          LIVE="${ROOT}/html"
          TMP="/tmp/platform-stage-$$"
          BACKUP="${ROOT}/platform-backup-$(date +%Y%m%d%H%M%S)"
          mkdir -p "$TMP"
          tar -xzf /tmp/platform-out.tar.gz -C "$TMP"
          mkdir -p "$BACKUP"
          cp -a "${LIVE}/." "${BACKUP}/" 2>/dev/null || true
          rsync -a --delete "${TMP}/" "${LIVE}/"
          rm -rf "$TMP" /tmp/platform-out.tar.gz
          find "${ROOT}" -maxdepth 1 -name "platform-backup-*" -type d | sort | head -n -3 | xargs rm -rf 2>/dev/null || true
          docker exec ai_video_nginx nginx -t 2>&1 && docker exec ai_video_nginx nginx -s reload || echo "nginx reload skipped"
          echo "Deploy complete: $(date) -> ${LIVE}"
          REMOTE
      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(node -e "fetch('https://shopify.lute-tlz-dddd.top/brands/momcozy',{redirect:'follow',signal:AbortSignal.timeout(8000)}).then(r=>process.stdout.write(String(r.status))).catch(()=>process.stdout.write('ERR'))")
          echo "Smoke test: /brands/momcozy -> HTTP ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Smoke test returned ${STATUS}"
          fi
