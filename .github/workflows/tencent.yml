name: Build and Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tencent-platform
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-out-${{ github.sha }}
          path: out/
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-out-${{ github.sha }}
          path: out/
      - name: Ensure deploy directories
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /opt/momcozy-platform/html
            mkdir -p /opt/ai-video/deploy/lighthouse
      - name: Upload nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "ops/nginx/momcozy-platform.conf"
          target: "/opt/ai-video/deploy/lighthouse/"
          strip_components: 2
      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "out/"
          target: "/opt/momcozy-platform/html-new"
          strip_components: 1
      - name: Atomic swap and reload nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mv /opt/momcozy-platform/html /opt/momcozy-platform/html-old 2>/dev/null || true
            mv /opt/momcozy-platform/html-new /opt/momcozy-platform/html
            rm -rf /opt/momcozy-platform/html-old
            docker exec ai_video_nginx nginx -t 2>&1 && docker exec ai_video_nginx nginx -s reload || echo "nginx reload skipped - test failed"
            echo "Deploy complete: $(date)"
