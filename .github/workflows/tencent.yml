name: Build and Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tencent-platform
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-out-${{ github.sha }}
          path: out/
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-out-${{ github.sha }}
          path: out/
      - name: Ensure deploy directories
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_ROOT
          script: |
            mkdir -p "${DEPLOY_ROOT}/html"
            mkdir -p /opt/ai-video/deploy/lighthouse
      - name: Upload nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "ops/nginx/momcozy-platform.conf"
          target: "/opt/ai-video/deploy/lighthouse/"
          strip_components: 2
      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "out/"
          target: "/tmp/momcozy-platform-new"
          strip_components: 1
      - name: Atomic swap and reload nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_ROOT
          script: |
            LIVE="${DEPLOY_ROOT}/html"
            BACKUP="${DEPLOY_ROOT}/platform-backup-$(date +%Y%m%d%H%M%S)"
            mkdir -p "${BACKUP}"
            cp -a "${LIVE}/." "${BACKUP}/" 2>/dev/null || true
            rsync -a --delete /tmp/momcozy-platform-new/ "${LIVE}/"
            rm -rf /tmp/momcozy-platform-new
            docker exec ai_video_nginx nginx -t 2>&1 && docker exec ai_video_nginx nginx -s reload || echo "nginx reload skipped"
            find "${DEPLOY_ROOT}" -maxdepth 1 -name "platform-backup-*" -type d | sort | head -n -3 | xargs rm -rf
            echo "Deploy complete: $(date) -> ${LIVE}"
